# GitLab CI — Astro egress allowlist check
#
# Add this job to your .gitlab-ci.yml (or include this file).
#
# IMPORTANT: run it on a GitLab runner that egresses through the same
# firewall/proxy as your Astro deployments (a self-managed / group runner in
# your network). GitLab.com shared runners egress from GitLab's network, not
# yours, and will not exercise your firewall.
#
# Set ASTRO_ORG_ID and ASTRO_CLUSTER_ID as CI/CD variables
# (Settings -> CI/CD -> Variables). Optionally also set ASTRO_MODE
# (hosted|remote-execution) and ASTRO_CLOUD (aws|gcp|azure) — the script reads
# them from the environment automatically. See the README.

astro-allowlist-check:
  stage: test
  image: python:3-slim
  variables:
    RAW_URL: "https://raw.githubusercontent.com/astronomer/allowlist-test/main/astro_network_check.py"
  script:
    - python3 -c "import urllib.request, os; urllib.request.urlretrieve(os.environ['RAW_URL'], 'astro_network_check.py')"
    - python3 astro_network_check.py
  # exit 0 = all reachable, 1 = BLOCKED (fails the job), 2 = warnings.
